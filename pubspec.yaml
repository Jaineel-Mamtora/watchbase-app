name: watchbase_app
description: 'WatchBase - Everything worth watching, in one place'

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  bloc: ^9.2.0
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  cupertino_native: ^0.1.1
  dio: ^5.9.0
  dynamic_color: ^1.8.1
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  fpdart: ^1.2.0
  freezed_annotation: ^3.1.0
  get_it: ^9.2.0
  go_router: ^17.0.1
  intl: ^0.20.2
  json_annotation: ^4.9.0

dev_dependencies:
  build_runner: ^2.10.5
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.4
  json_serializable: ^6.11.4

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
